<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="每日国内外股票、基金与 ETF 资讯看板" />
    <link rel="icon" href="data:," />
    <title>每日股市资讯看板</title>
    <style>
      :root {
        --ink: #171420;
        --muted: #665f72;
        --paper: #fffdf8;
        --line: #171420;
        --pink: #ff5ca8;
        --yellow: #ffd84d;
        --blue: #57c9ff;
        --lime: #adf27c;
        --purple: #b99cff;
        --orange: #ff9466;
        --shadow: 5px 6px 0 var(--ink);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 5%, rgba(255, 92, 168, .2), transparent 25rem),
          radial-gradient(circle at 95% 20%, rgba(87, 201, 255, .24), transparent 28rem),
          #f7f1ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button, select { font: inherit; }
      button:focus-visible, select:focus-visible, a:focus-visible { outline: 4px solid #fff; box-shadow: 0 0 0 7px var(--ink); }
      .shell { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 22px 0 56px; }

      .hero {
        position: relative;
        overflow: hidden;
        padding: clamp(24px, 5vw, 58px);
        border: 2px solid var(--line);
        border-radius: 28px;
        background: var(--yellow);
        box-shadow: var(--shadow);
      }
      .hero::after {
        position: absolute;
        right: -35px;
        top: -55px;
        width: 190px;
        height: 190px;
        border: 2px solid var(--ink);
        border-radius: 50%;
        background: var(--pink);
        content: "";
      }
      .eyebrow { margin: 0 0 12px; font-size: 13px; font-weight: 850; letter-spacing: .14em; text-transform: uppercase; }
      h1 { position: relative; z-index: 1; max-width: 820px; margin: 0; font-size: clamp(34px, 7vw, 74px); line-height: .98; letter-spacing: -.05em; }
      .lede { position: relative; z-index: 1; max-width: 760px; margin: 20px 0 0; font-size: clamp(16px, 2.2vw, 21px); line-height: 1.65; }

      .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 22px 0; }
      .metric { min-height: 118px; padding: 18px; border: 2px solid var(--line); border-radius: 20px; box-shadow: 3px 4px 0 var(--ink); }
      .metric:nth-child(1) { background: var(--blue); }
      .metric:nth-child(2) { background: var(--lime); }
      .metric:nth-child(3) { background: var(--purple); }
      .metric:nth-child(4) { background: var(--orange); }
      .metric span { display: block; margin-bottom: 15px; color: #292333; font-size: 12px; font-weight: 850; letter-spacing: .09em; }
      .metric strong { display: block; font-size: clamp(19px, 3vw, 29px); line-height: 1.1; }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: end;
        margin: 30px 0 18px;
      }
      .filters { display: flex; flex-wrap: wrap; gap: 9px; }
      .chip, .archive {
        min-height: 42px;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: var(--paper);
        color: var(--ink);
        font-weight: 800;
      }
      .chip { padding: 8px 15px; cursor: pointer; }
      .chip[aria-pressed="true"] { background: var(--pink); box-shadow: 2px 3px 0 var(--ink); }
      .archive-wrap { display: grid; gap: 6px; }
      .archive-wrap label { font-size: 12px; font-weight: 800; }
      .archive { max-width: 180px; padding: 8px 32px 8px 13px; }
      .mobile-alt { display: inline-block; margin-top: 10px; color: var(--ink); font-weight: 850; }

      .status { min-height: 24px; margin: 0 0 16px; color: var(--muted); font-size: 14px; font-weight: 700; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .card {
        display: flex;
        min-height: 330px;
        flex-direction: column;
        padding: 22px;
        border: 2px solid var(--line);
        border-radius: 24px;
        background: var(--paper);
        box-shadow: 4px 5px 0 var(--ink);
      }
      .card:nth-child(4n+1) { border-top: 12px solid var(--pink); }
      .card:nth-child(4n+2) { border-top: 12px solid var(--blue); }
      .card:nth-child(4n+3) { border-top: 12px solid var(--lime); }
      .card:nth-child(4n) { border-top: 12px solid var(--purple); }
      .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
      .tag { padding: 5px 9px; border: 1.5px solid var(--ink); border-radius: 999px; background: #fff; font-size: 12px; font-weight: 800; }
      .tag.official { background: var(--yellow); }
      .tag.tone-偏积极 { background: var(--lime); }
      .tag.tone-偏谨慎 { background: #ffb2ac; }
      .tag.tone-混合 { background: var(--purple); }
      .card h2 { margin: 0 0 13px; font-size: clamp(21px, 3vw, 29px); line-height: 1.22; letter-spacing: -.025em; overflow-wrap: anywhere; }
      .summary { margin: 0 0 16px; color: #383242; font-size: 16px; line-height: 1.7; }
      .why { margin: 0 0 20px; padding: 12px 14px; border-left: 5px solid var(--pink); border-radius: 0 12px 12px 0; background: #fff2f8; line-height: 1.55; }
      .why strong { display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: .08em; }
      .source { display: flex; gap: 12px; align-items: end; justify-content: space-between; margin-top: auto; padding-top: 16px; border-top: 1.5px dashed #948b9e; }
      .source-meta { color: var(--muted); font-size: 13px; line-height: 1.5; }
      .source a { flex: 0 0 auto; padding: 9px 12px; border: 2px solid var(--ink); border-radius: 12px; background: var(--yellow); color: var(--ink); font-size: 13px; font-weight: 850; text-decoration: none; }
      .empty { grid-column: 1 / -1; padding: 50px 20px; border: 2px dashed var(--ink); border-radius: 22px; text-align: center; }
      footer { margin-top: 34px; padding: 20px 4px; color: var(--muted); font-size: 13px; line-height: 1.7; text-align: center; }

      @media (max-width: 800px) {
        .hero::after { width: 110px; height: 110px; right: -28px; top: -35px; }
        .metrics { grid-template-columns: repeat(2, 1fr); }
        .toolbar { grid-template-columns: 1fr; }
        .grid { grid-template-columns: 1fr; }
        .archive { max-width: none; width: 100%; }
      }
      @media (max-width: 460px) {
        .shell { width: min(100% - 18px, 1180px); padding-top: 10px; }
        .hero { border-radius: 20px; box-shadow: 3px 4px 0 var(--ink); }
        .metrics { gap: 9px; }
        .metric { min-height: 102px; padding: 14px; border-radius: 16px; }
        .card { min-height: 0; padding: 18px; border-radius: 19px; }
        .source { align-items: stretch; flex-direction: column; }
        .source a { text-align: center; }
      }
      @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Daily Market Brief</p>
        <h1 id="page-title">每日股市资讯看板</h1>
        <p id="market-summary" class="lede">正在载入今日市场资讯…</p>
        <a class="mobile-alt" href="https://cdn.jsdelivr.net/gh/junpeng957-coder/stock-daily-dashboard@main/docs/mobile.html">手机加载失败？打开备用入口 ↗</a>
      </section>

      <section class="metrics" aria-label="日报信息">
        <article class="metric"><span>日期</span><strong id="date">—</strong></article>
        <article class="metric"><span>资讯数量</span><strong id="count">—</strong></article>
        <article class="metric"><span>覆盖地区</span><strong id="regions">—</strong></article>
        <article class="metric"><span>更新时间</span><strong id="updated">—</strong></article>
      </section>

      <section class="toolbar" aria-label="资讯筛选">
        <div>
          <p class="eyebrow">筛选资讯</p>
          <div id="filters" class="filters"></div>
        </div>
        <div class="archive-wrap">
          <label for="archive">历史日报</label>
          <select id="archive" class="archive" aria-label="选择历史日报"></select>
        </div>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
      <section id="grid" class="grid" aria-label="资讯列表"></section>
      <footer id="footer">自动汇总，仅供信息参考，不构成任何投资建议。</footer>
    </main>

    <script>
      const state = { digest: null, region: "全部地区", asset: "全部资产" };
      const regionFilters = ["全部地区", "A股", "港股", "美股", "全球宏观"];
      const assetFilters = ["全部资产", "股票", "基金", "ETF"];
      const $ = (selector) => document.querySelector(selector);

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        return node;
      }

      function formatTime(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime())
          ? value
          : new Intl.DateTimeFormat("zh-CN", { timeZone: "Asia/Shanghai", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).format(date);
      }

      function renderFilters() {
        const root = $("#filters");
        root.replaceChildren();
        [...regionFilters, ...assetFilters].forEach((label) => {
          const isRegion = regionFilters.includes(label);
          const active = isRegion ? state.region === label : state.asset === label;
          const count = label.startsWith("全部") || !state.digest ? "" : ` ${state.digest.coverage?.[label] ?? 0}`;
          const button = el("button", "chip", label + count);
          button.type = "button";
          button.setAttribute("aria-pressed", String(active));
          button.addEventListener("click", () => {
            if (isRegion) state.region = label;
            else state.asset = label;
            renderFilters();
            renderCards();
          });
          root.append(button);
        });
      }

      function makeTag(text, extra = "") {
        return el("span", `tag ${extra}`.trim(), text);
      }

      function renderCards() {
        const root = $("#grid");
        root.replaceChildren();
        if (!state.digest) return;
        const items = state.digest.items.filter((item) => {
          const regionMatch = state.region === "全部地区" || item.region === state.region;
          const assetMatch = state.asset === "全部资产" || item.asset_types.includes(state.asset);
          return regionMatch && assetMatch;
        }).slice(0, state.region === "全部地区" && state.asset === "全部资产" ? state.digest.items.length : 10);
        $("#status").textContent = `当前显示 ${items.length} 条资讯${state.region === "全部地区" && state.asset === "全部资产" ? "（已去重）" : "（板块上限 10 条）"}`;
        if (!items.length) {
          root.append(el("div", "empty", "当前筛选条件下暂无资讯。"));
          return;
        }
        items.forEach((item) => {
          const card = el("article", "card");
          const tags = el("div", "tags");
          tags.append(makeTag(item.region), makeTag(item.market_tone, `tone-${item.market_tone}`));
          item.asset_types.forEach((asset) => tags.append(makeTag(asset)));
          if (item.official) tags.append(makeTag("官方来源", "official"));

          const title = el("h2", "", item.title);
          const summary = el("p", "summary", item.summary);
          const why = el("div", "why");
          why.append(el("strong", "", "为什么值得关注"), el("span", "", item.why_it_matters));
          const source = el("div", "source");
          const meta = el("div", "source-meta");
          meta.append(el("strong", "", item.source_name), document.createElement("br"), document.createTextNode(formatTime(item.published_at)));
          const link = el("a", "", "阅读原文 ↗");
          link.href = item.source_url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          source.append(meta, link);
          card.append(tags, title, summary, why, source);
          root.append(card);
        });
      }

      function renderDigest(digest) {
        state.digest = digest;
        document.title = `${digest.headline} | 每日股市资讯`;
        $("#page-title").textContent = digest.headline;
        $("#market-summary").textContent = digest.market_summary;
        $("#date").textContent = digest.date;
        $("#count").textContent = `${digest.items.length} 条`;
        $("#regions").textContent = new Set(digest.items.map((item) => item.region)).size + " 类";
        $("#updated").textContent = formatTime(digest.generated_at).split(" ").at(-1);
        $("#footer").textContent = `${digest.disclaimer} 数据更新时间：${digest.generated_at}`;
        renderFilters();
        renderCards();
      }

      async function loadDigest(path = "data/latest.json") {
        $("#status").textContent = "正在载入…";
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`载入失败（${response.status}）`);
        renderDigest(await response.json());
      }

      async function loadArchive() {
        const select = $("#archive");
        const response = await fetch("data/archive.json", { cache: "no-store" });
        if (!response.ok) throw new Error("历史日报载入失败");
        const archive = await response.json();
        select.replaceChildren();
        archive.dates.forEach((date, index) => {
          const option = el("option", "", index === 0 ? `${date}（最新）` : date);
          option.value = date;
          select.append(option);
        });
        select.addEventListener("change", () => loadDigest(`data/${select.value}.json`).catch(showError));
      }

      function showError(error) {
        $("#status").textContent = `暂时无法载入：${error.message}`;
        $("#grid").replaceChildren(el("div", "empty", "请稍后刷新，上一期有效数据不会被覆盖。"));
      }

      Promise.all([loadDigest(), loadArchive()]).catch(showError);
    </script>
  </body>
</html>
