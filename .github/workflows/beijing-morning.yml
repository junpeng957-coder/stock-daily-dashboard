name: 北京时间晨报更新

on:
  schedule:
    # GitHub previously kept firing the daily slot around 15:30 Beijing time
    # even after its UTC hour was changed. An hourly tick plus a runtime clock
    # check avoids depending on the scheduler's timezone interpretation.
    - cron: "10 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  beijing_morning_gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.clock.outputs.should_run }}
    steps:
      - name: 检查北京时间
        id: clock
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          beijing_hour="$(TZ=Asia/Shanghai date +%H)"
          echo "Beijing hour: ${beijing_hour}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$beijing_hour" = "07" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  update:
    needs: beijing_morning_gate
    if: needs.beijing_morning_gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 生成并验证日报
        env:
          WATCHLIST_JSON: ${{ secrets.WATCHLIST_JSON }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
        run: |
          python generate.py --self-test
          python generate.py

      - name: 保存最近 30 天数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/mobile.html
          git diff --cached --quiet || git commit -m "data: update daily market digest"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: 发布 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 推送飞书摘要
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DASHBOARD_URL: ${{ steps.deployment.outputs.page_url }}
        run: python generate.py --notify
